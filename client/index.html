<!doctype html>
<html lang="en" style="background-color: #09090b;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRM Enterprise Portal</title>
    
    <!-- 1. Critical Early-Boot CSS (Prevents white flash before index.css loads) -->
    <style id="critical-theme-reset">
      :root {
        background-color: #09090b; /* Monolith Default */
        color-scheme: dark;
      }
      [data-theme="premium-canvas"] {
        background-color: #f9fafb !important;
        color-scheme: light;
      }
      [data-theme="premium-aero"] {
        background-color: #f8fafc !important;
        color-scheme: light;
      }
      html, body {
        background-color: inherit !important;
        margin: 0;
        padding: 0;
      }
    </style>

    <script>
      (function() {
        const savedTheme = localStorage.getItem('nexus_theme_preference') || 'premium-monolith';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Anti-flicker: Update the critical background immediately
        const isLight = savedTheme === 'premium-canvas' || savedTheme === 'premium-aero';
        const bg = isLight ? (savedTheme === 'premium-canvas' ? '#f9fafb' : '#f8fafc') : '#09090b';
        document.documentElement.style.backgroundColor = bg;

        const cachedColors = localStorage.getItem('nexus_theme_custom_colors');
        if (cachedColors) {
          try {
            const colors = JSON.parse(cachedColors);
            let css = '[data-theme="' + savedTheme + '"] {';
            for (const [key, value] of Object.entries(colors)) {
              if (value) css += '--' + key + ': ' + value + ' !important;';
            }
            if (colors['bg-main']) {
               document.documentElement.style.backgroundColor = colors['bg-main'];
               css += 'background-color: ' + colors['bg-main'] + ' !important;';
            }
            css += '}';
            if (colors['bg-main']) {
               css += '\nhtml, body { background-color: ' + colors['bg-main'] + ' !important; }';
            }
            const style = document.createElement('style');
            style.id = 'theme-overrides-early';
            style.innerHTML = css;
            document.head.appendChild(style);
          } catch (e) {}
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
