<!doctype html>
<!-- ID: IDENTITY-SYNC-v1.3 (Steel-Clad zero flicker) -->
<html lang="en">
  <head>
    <script>
      /* --- INDESTRUCTIBLE THEME ENGINE --- */
      (function() {
        const TOKEN_KEY = 'nexus_auth_token';
        const PREF_KEY = 'nexus_theme_preference';
        const BASE_COLOR_KEY = 'nexus_theme_custom_colors';
        
        let orgId = 'default';
        try {
          const token = localStorage.getItem(TOKEN_KEY);
          if (token) {
            const parts = token.split('.');
            if (parts.length === 3) {
              const base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
              const pad = base64.length % 4;
              const padded = pad ? base64 + '===='.slice(pad) : base64;
              const decoded = JSON.parse(atob(padded));
              if (decoded.organizationId) orgId = decoded.organizationId;
            }
          }
        } catch (e) {}

        const savedTheme = localStorage.getItem(PREF_KEY) || 'premium-monolith';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Define core background colors to prevent variable-lookup delay
        const defaults = {
          'premium-monolith': { bg: '#09090b', text: '#ffffff' },
          'premium-canvas': { bg: '#f8fafc', text: '#0f172a' },
          'premium-aero': { bg: '#f8fafc', text: '#0f172a' }
        };
        const themeDef = defaults[savedTheme] || defaults['premium-monolith'];
        
        // --- ATOMIC STYLE ANCHOR (Cannot be overridden by external CSS) ---
        const styleBlock = document.createElement('style');
        styleBlock.id = 'zero-flicker-shield';
        styleBlock.innerHTML = `
          :root {
            --bg-main: ${themeDef.bg};
            --text-primary: ${themeDef.text};
            background-color: ${themeDef.bg};
          }
          *, *::before, *::after {
            transition: none !important;
            animation: none !important;
          }
          html, body, #root {
            background-color: ${themeDef.bg} !important;
            color: ${themeDef.text};
            margin: 0;
            padding: 0;
            min-height: 100vh;
          }
        `;
        document.head.appendChild(styleBlock);
        
        // --- IDENTITY-SCOPED CUSTOM OVERRIDES ---
        const SCOPED_COLOR_KEY = BASE_COLOR_KEY + '_' + orgId;
        const cachedColors = localStorage.getItem(SCOPED_COLOR_KEY);
        
        if (cachedColors) {
          try {
            const colors = JSON.parse(cachedColors);
            let css = '[data-theme="' + savedTheme + '"] {';
            for (const [key, value] of Object.entries(colors)) {
              if (value) css += '--' + key + ': ' + value + ' !important;';
            }
            if (colors['bg-main']) {
               css += 'background-color: ' + colors['bg-main'] + ' !important;';
            }
            css += '}\nhtml, body, #root { background-color: ' + (colors['bg-main'] || themeDef.bg) + ' !important; }';
            
            const style = document.createElement('style');
            style.id = 'theme-overrides-early';
            style.innerHTML = css;
            document.head.appendChild(style);
          } catch (e) {}
        }
        
        // Gradually re-enable animations after React is stable
        window.addEventListener('load', function() {
          setTimeout(() => {
            const shield = document.getElementById('zero-flicker-shield');
            if (shield) {
               // Only remove the transition suppression part
               shield.innerHTML = shield.innerHTML.split('*, *::before')[0] + ' }';
            }
          }, 2000);
        });
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRM Enterprise Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
