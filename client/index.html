<!doctype html>
<!-- ID: IDENTITY-SYNC-v1.6 (Hyper-Specific Atomic Lock) -->
<html lang="en" class="boot-lock">
  <head>
    <script>
      /* --- HYPER-SPECIFIC ATOMIC THEME ENGINE (v1.6) --- */
      (function() {
        const TOKEN_KEY = 'nexus_auth_token';
        const BASE_PREF_KEY = 'nexus_theme_preference';
        const BASE_COLOR_KEY = 'nexus_theme_custom_colors';
        
        let orgId = 'default';
        try {
          const token = localStorage.getItem(TOKEN_KEY);
          if (token) {
            const parts = token.split('.');
            if (parts.length === 3) {
              const base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
              const pad = base64.length % 4;
              const padded = pad ? base64 + '===='.slice(pad) : base64;
              const decoded = JSON.parse(atob(padded));
              orgId = decoded.organizationId || decoded.orgId || 'default';
            }
          }
        } catch (e) {}

        const SCOPED_PREF_KEY = BASE_PREF_KEY + '_' + orgId;
        const savedTheme = localStorage.getItem(SCOPED_PREF_KEY) || localStorage.getItem(BASE_PREF_KEY) || 'premium-monolith';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Atomic Defaults
        const defaults = {
          'premium-monolith': { bg: '#09090b', text: '#ffffff' },
          'premium-canvas': { bg: '#f8fafc', text: '#0f172a' },
          'premium-aero': { bg: '#f8fafc', text: '#0f172a' }
        };
        const themeDef = defaults[savedTheme] || defaults['premium-monolith'];
        
        // 1. HYPER-LOCK: Force root variables with high specificity
        const styleBlock = document.createElement('style');
        styleBlock.id = 'pinnacle-core-lock';
        styleBlock.innerHTML = `
          html, :root {
            --bg-main: ${themeDef.bg} !important;
            --text-primary: ${themeDef.text} !important;
            background-color: ${themeDef.bg} !important;
          }
          html[data-theme], :root {
             --bg-main: ${themeDef.bg} !important;
             --text-primary: ${themeDef.text} !important;
          }
          html.boot-lock, html.boot-lock *, html.boot-lock *::before, html.boot-lock *::after {
            transition: none !important;
            animation: none !important;
          }
          body, #root {
            background-color: ${themeDef.bg} !important;
            color: ${themeDef.text} !important;
            margin: 0; padding: 0; min-height: 100vh;
          }
        `;
        document.head.appendChild(styleBlock);
        
        // 2. IDENTITY OVERRIDE: Precise branding injection (Highest Priority)
        const SCOPED_COLOR_KEY = BASE_COLOR_KEY + '_' + orgId;
        const cachedColors = localStorage.getItem(SCOPED_COLOR_KEY) || localStorage.getItem(BASE_COLOR_KEY + '_default');
        
        if (cachedColors) {
          try {
            const colors = JSON.parse(cachedColors);
            let css = 'html[data-theme], :root {';
            for (const [key, value] of Object.entries(colors)) {
              if (value) css += '--' + key + ': ' + value + ' !important;';
            }
            if (colors['bg-main']) {
               css += 'background-color: ' + colors['bg-main'] + ' !important;';
            }
            css += '}\nhtml.boot-lock body, html.boot-lock #root { background-color: ' + (colors['bg-main'] || themeDef.bg) + ' !important; }';
            
            const style = document.createElement('style');
            style.id = 'pinnacle-identity-lock';
            style.innerHTML = css;
            document.head.appendChild(style);
          } catch (e) {}
        }

        // 3. CLEANUP: Release the boot-lock after stabilization
        window.addEventListener('DOMContentLoaded', () => {
          setTimeout(() => {
            document.documentElement.classList.remove('boot-lock');
          }, 2000);
        });
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRM Enterprise Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
