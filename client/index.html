<!doctype html>
<!-- ID: IDENTITY-SYNC-v1.2 (Absolute Flicker-Kill) -->
<html lang="en">
  <head>
    <script>
      /* --- PINNACLE IDENTITY-AWARE THEME ENGINE --- */
      (function() {
        const TOKEN_KEY = 'nexus_auth_token';
        const PREF_KEY = 'nexus_theme_preference';
        const BASE_COLOR_KEY = 'nexus_theme_custom_colors';
        
        let orgId = 'default';
        try {
          const token = localStorage.getItem(TOKEN_KEY);
          if (token) {
            // Decode JWT payload (middle part) without libraries
            const payloadBase64 = token.split('.')[1];
            if (payloadBase64) {
              const decoded = JSON.parse(atob(payloadBase64.replace(/-/g, '+').replace(/_/g, '/')));
              if (decoded.organizationId) {
                orgId = decoded.organizationId;
              }
            }
          }
        } catch (e) {}

        const savedTheme = localStorage.getItem(PREF_KEY) || 'premium-monolith';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Anti-flicker: Set primitive background immediately
        const isLight = savedTheme === 'premium-canvas' || savedTheme === 'premium-aero';
        const bg = isLight ? (savedTheme === 'premium-canvas' ? '#f9fafb' : '#f8fafc') : '#09090b';
        document.documentElement.style.backgroundColor = bg;
        
        // 1. ELIMINATE FLICKER: Disable all transitions during boot
        const styleBlock = document.createElement('style');
        styleBlock.id = 'anti-flicker-shield';
        styleBlock.innerHTML = `
          *, *::before, *::after {
            transition: none !important;
            animation: none !important;
          }
          html, body {
            background-color: ${bg} !important;
          }
        `;
        document.head.appendChild(styleBlock);
        
        // 2. Inject IDENTITY-SCOPED cached colors
        const SCOPED_COLOR_KEY = BASE_COLOR_KEY + '_' + orgId;
        const cachedColors = localStorage.getItem(SCOPED_COLOR_KEY);
        
        if (cachedColors) {
          try {
            const colors = JSON.parse(cachedColors);
            let css = '[data-theme="' + savedTheme + '"] {';
            for (const [key, value] of Object.entries(colors)) {
              if (value) css += '--' + key + ': ' + value + ' !important;';
            }
            if (colors['bg-main']) {
               document.documentElement.style.backgroundColor = colors['bg-main'];
               css += 'background-color: ' + colors['bg-main'] + ' !important;';
            }
            css += '}\nhtml, body, #root { background-color: ' + (colors['bg-main'] || bg) + ' !important; }';
            
            const style = document.createElement('style');
            style.id = 'theme-overrides-early';
            style.innerHTML = css;
            document.head.appendChild(style);
          } catch (e) {}
        }
        
        window.addEventListener('load', function() {
          setTimeout(() => {
            const shield = document.getElementById('anti-flicker-shield');
            if (shield) shield.remove();
          }, 1500);
        });
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRM Enterprise Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
