<!doctype html>
<!-- ID: IDENTITY-SYNC-v1.5 (Absolute-Lock Zero Flicker) -->
<html lang="en">
  <head>
    <script>
      /* --- ABSOLUTE-LOCK THEME ENGINE --- */
      (function() {
        const TOKEN_KEY = 'nexus_auth_token';
        const BASE_PREF_KEY = 'nexus_theme_preference';
        const BASE_COLOR_KEY = 'nexus_theme_custom_colors';
        
        let orgId = 'default';
        try {
          const token = localStorage.getItem(TOKEN_KEY);
          if (token) {
            const parts = token.split('.');
            if (parts.length === 3) {
              const base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
              const pad = base64.length % 4;
              const padded = pad ? base64 + '===='.slice(pad) : base64;
              const decoded = JSON.parse(atob(padded));
              orgId = decoded.organizationId || decoded.orgId || 'default';
            }
          }
        } catch (e) {}

        const SCOPED_PREF_KEY = BASE_PREF_KEY + '_' + orgId;
        const savedTheme = localStorage.getItem(SCOPED_PREF_KEY) || localStorage.getItem(BASE_PREF_KEY) || 'premium-monolith';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Atomic Defaults
        const defaults = {
          'premium-monolith': { bg: '#09090b', text: '#ffffff' },
          'premium-canvas': { bg: '#f8fafc', text: '#0f172a' },
          'premium-aero': { bg: '#f8fafc', text: '#0f172a' }
        };
        const themeDef = defaults[savedTheme] || defaults['premium-monolith'];
        
        // 1. ANCHOR: Define variables and lock background before ANYTHING else
        const styleBlock = document.createElement('style');
        styleBlock.id = 'pinnacle-root-lock';
        styleBlock.innerHTML = `
          :root {
            --bg-main: ${themeDef.bg};
            --text-primary: ${themeDef.text};
            background-color: ${themeDef.bg};
          }
          html, body, #root {
            background-color: ${themeDef.bg} !important;
            color: ${themeDef.text} !important;
            margin: 0; padding: 0; min-height: 100vh;
            transition: none !important; /* CRITICAL: Kill any accidental fades */
          }
        `;
        document.head.appendChild(styleBlock);
        
        // 2. IDENTITY OVERRIDE: Precision branding injection
        const SCOPED_COLOR_KEY = BASE_COLOR_KEY + '_' + orgId;
        const cachedColors = localStorage.getItem(SCOPED_COLOR_KEY) || localStorage.getItem(BASE_COLOR_KEY + '_default');
        
        if (cachedColors) {
          try {
            const colors = JSON.parse(cachedColors);
            let css = ':root, [data-theme="' + savedTheme + '"] {';
            for (const [key, value] of Object.entries(colors)) {
              if (value) css += '--' + key + ': ' + value + ' !important;';
            }
            if (colors['bg-main']) {
               css += 'background-color: ' + colors['bg-main'] + ' !important;';
            }
            css += '}\nhtml, body, #root { background-color: ' + (colors['bg-main'] || themeDef.bg) + ' !important; transition: none !important; }';
            
            const style = document.createElement('style');
            style.id = 'theme-overrides-early';
            style.innerHTML = css;
            document.head.appendChild(style);
          } catch (e) {}
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRM Enterprise Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
